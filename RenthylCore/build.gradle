


plugins {
    id 'buildlogic.java-application-conventions'
    id 'java-library'
    id 'signing'
}

repositories {
    mavenCentral()
    jcenter()
	maven { url "https://jitpack.io" }
}

project.ext {
    jmeVer = '3.8.0-alpha2'
    boostVer = '1.2.3'
}

dependencies {
    implementation "org.jmonkeyengine:jme3-core:$jmeVer"
    implementation "org.jmonkeyengine:jme3-lwjgl3:$jmeVer"
    implementation "com.github.codex128:Boost:$boost"
}

task copyJavadoc(dependsOn: javadoc) {
    
}

// remove the generated javadocs in the /docs folder
task cleanJavadoc(type: Delete) {
    delete "$projectDir/docs/javadoc/"
}

clean {
    dependsOn cleanJavadoc
}

build {
    dependsOn copyJavadoc
}

task sourcesJar(type: Jar) {
    from sourceSets.main.allJava
    archiveClassifier = 'sources'
}

task javadocJar(type: Jar) {
    from javadoc
    archiveClassifier = 'javadoc'
}

javadoc {
    failOnError = false
}

publishing {
    publications {
        MyPublication(MavenPublication) {
            groupId = 'com.github.codex128'
            artifactId = 'renthyl-rendering-library'
            version = '1.2.2'
            from components.java
            artifact sourcesJar
            artifact javadocJar
        }
    }
}

